<app-sidebar [abierto]="sidebarAbierto"
  (cerrarSidebar)="sidebarAbierto = $event"></app-sidebar>
<app-navbar [sidebarAbierto]="sidebarAbierto"
  (toggleSidebar)="abrirSide()"></app-navbar>

<div class="contenedor-principal">
  <div class="vista-principal">
    <router-outlet></router-outlet>
  </div>
  <app-footer></app-footer>
</div>

<button class="fab" (click)="abrirModal()" aria-label="Añadir oferta">
  +
</button>

<div *ngIf="modalAbierto" class="modal" (click)="cerrarModal()">
  <div class="modal-contenido" (click)="$event.stopPropagation()">
    <crear-oferta (cerrarModal)="cerrarModal()"></crear-oferta>
  </div>
</div>
