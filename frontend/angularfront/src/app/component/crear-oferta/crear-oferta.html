<form action="">
    <div>
        <label for="tipo" class="form-label">Compra/venta</label>
        <select class="form-control" id="tipo" name="tipo">
            <option value="compra">Compra</option>
            <option value="venta">Venta</option>
        </select>
    </div>
    <div>
        <label for="nombreCard" class="form-label">Nombre de la Carta</label>
        <input type="text" class="form-control" id="nombreCard" name="nombreCard">
    </div>
    <div>
        <label for="coleccion" class="form-label">Colección</label>
        <input type="text" class="form-control" id="coleccion" name="coleccion">
    </div>
    <div>
        <label for="empresa" class="form-label">Empresa</label>
        <input type="text" class="form-control" id="empresa" name="empresa">
    </div>
    <div>
        <label for="valor" class="form-label">Valor</label>
        <input type="number" class="form-control" id="valor" name="valor" step="0.01">
    </div>
    <div>
        <label for="estado" class="form-label">Estado</label>
        <input type="text" class="form-control" id="estado" name="estado">
    </div>
    <div>
        <label for="copias" class="form-label">Cantidad</label>
        <input type="number" class="form-control" id="copias" name="copias">
    </div>
    <button type="submit" class="btn btn-primary">Crear Oferta</button>
</form>
