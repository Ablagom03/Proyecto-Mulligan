<div class="contenedor-grid">
  <header></header>
  
  <div class="listado">
    @for (carta of listadoCartas$ | async; track carta.cardid) {
    <div class="carta">
      <div class="text">
        <h2>{{ carta.nombrecard }}</h2>
      </div>
      <div class="text">
        <p>{{ carta.descripcion}}</p>
      </div>
      <div>
        <a [routerLink]="['/carta']" [queryParams]="{ id: carta.cardid}">Ver carta</a>
      </div>
    </div>
    }
    @empty{
    <div class="vacio">
      <h1>No hay cartas de esta marca</h1>
    </div>
  }
  </div>

</div>
