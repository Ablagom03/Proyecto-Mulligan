<nav class="navbar">
    <div class="nav-left">
        <button class="side-btn" (click)="abrirSide()">☰</button>
        <a [routerLink]="['']"><img [src]="'http://localhost:8080/imagenes/' + 'logoMulligan'" alt="Logo" class="logo"></a>
    </div>
    <div class="nav-center">

    </div>
    <div class="nav-right">
        @if (isLoggedIn$ | async) {
            
            <a [routerLink]="['/usuario/' + (currentUser?.nombre_usr || '')]">
                <button class="nav-btn profile-btn" title="Mi perfil">
                    {{ currentUser?.nombre_usr || 'Perfil' }}
                </button>
            </a>
            <button class="nav-btn logout-btn" (click)="logout()">Cerrar sesión</button>
        } @else {
            <a [routerLink]="['/login']"><button class="nav-btn">Iniciar sesión</button></a>
            <a [routerLink]="['/signIn']"><button class="nav-btn">Registrarse</button></a>
        }
    </div>
</nav>
