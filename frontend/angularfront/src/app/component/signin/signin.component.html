<div class="login">
  <div class="login-pantalla">
    <div class="volver">
      <a [routerLink]="['/inicio']">&#8592; Volver</a>
    </div>
    <div class="titulo">
      <h1>Registrarse</h1>
    </div>

    <form class="form" (ngSubmit)="register()" #signupForm="ngForm">
      <div class="input-group">
        <input
          name="nombre_usr"
          type="text"
          class="login-field"
          placeholder="Nombre de usuario"
          required
          [(ngModel)]="user.nombre_usr"
        />
      </div>

      <div class="input-group">
        <input
          name="email"
          type="email"
          class="login-field"
          placeholder="Email"
          required
          [(ngModel)]="user.email"
        />
      </div>

      <div class="input-group">
        <input
          name="passwd"
          type="password"
          class="login-field"
          placeholder="Contraseña"
          required
          [(ngModel)]="user.passwd"
        />
      </div>

      <div class="input-group terms-group">
        <label>
          <input type="checkbox" name="acepto" required /> Acepto los términos
        </label>
      </div>

      <button class="btn" type="submit" [disabled]="signupForm.invalid">Registrarse</button>
    </form>
  </div>
</div>
