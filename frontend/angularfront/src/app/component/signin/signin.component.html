<div class="login">
  <div class="login-pantalla">
    <div class="volver">
      <a [routerLink]="['/inicio']">&#8592; Volver</a>
    </div>
    <div class="titulo">
      <h1>Registrarse</h1>
    </div>
    <div *ngIf="mensajeError" class="error-badge">
      {{ mensajeError }}
    </div>

    <form class="form" (ngSubmit)="register()" #signupForm="ngForm">
      <div class="input-group">
        <input
          name="nombre_usr"
          type="text"
          class="login-field"
          [class.input-invalid]="mensajeError" 
          placeholder="Nombre de usuario"
          required
          [(ngModel)]="user.nombre_usr"
        />
      </div>

      <div class="input-group">
        <input
          name="email"
          type="email"
          class="login-field"
          [class.input-invalid]="mensajeError"
          placeholder="Email"
          required
          [(ngModel)]="user.email"
        />
      </div>

      <div class="input-group">
        <input
          name="passwd"
          type="password"
          class="login-field"
          [class.input-invalid]="mensajeError"
          placeholder="Contraseña"
          required
          [(ngModel)]="user.passwd"
        />
      </div>

      <div class="input-group terms-group">
        <label for="acepto" style="font-size: 12px; color: #777; cursor: pointer;">
          Acepto los términos y condiciones
        </label>
        <input 
          type="checkbox" 
          id="acepto" 
          name="acepto" 
          ngModel 
          required 
          style="width: auto; margin-left: 10px;"
        />
      </div>

      <button class="btn" type="submit" [disabled]="signupForm.invalid">Registrarse</button>
    </form>
  </div>
</div>
