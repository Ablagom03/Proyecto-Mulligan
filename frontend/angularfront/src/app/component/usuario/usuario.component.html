@if (currentUser$ | async; as user) {
    <div class="informacion-usuario">
        <div class="imagen-usuario">
            <img src="assets/default-avatar.png" 
                 alt="Avatar de {{ user.nombre_usr }}"
                 onerror="this.src='https://ui-avatars.com/api/?name=User'">
        </div>
        
        <div class="no-imagen">
            <h1 class="nombre-usuario">{{ user.nombre_usr }}</h1>
            
            <div class="descripcion-usuario">
                <p>Descripción de {{ user.nombre_usr }}</p>
            </div>

            <div class="reputacion">
                Reputación: <span class="badge-reputacion">{{ user.reputacion }}</span>
            </div>
            
            <div class="cambiarModo">
                <button (click)="mostrarInventario()" 
                        [class.active]="vistaActual === 'inventario'"
                        class="btn-tab">
                    Vendo
                </button>
                <button (click)="mostrarDeseados()" 
                        [class.active]="vistaActual === 'deseados'"
                        class="btn-tab">
                    Compro
                </button>
            </div>
        </div>
    </div>

    <div class="contenedor-listas">
        @if (vistaActual === 'inventario') {
            <div class="seccion-inventario card-container">
                <h2>Cartas en Venta</h2>
                </div>
        }
        @if (vistaActual === 'deseados') {
            <div class="seccion-deseados card-container">
                <h2>Cartas que Compro</h2>
                </div>
        }
    </div>
} @else {
    <div class="no-usuario-card">
        <div class="spinner"></div>
        <p>Buscando perfil del usuario...</p>
    </div>
}
