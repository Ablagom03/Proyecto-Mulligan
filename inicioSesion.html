<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesion</title>
    <link rel="stylesheet" href="css/inicioSesion.css">
</head>
<body>
   <div class="login">
            <div class="login-pantalla">
                <div class="titulo">
                    <h1>Bienvenido</h1>
                </div>
    
                <div class="form">
                    <div class="input-group">
                    <input type="text" class="login-field" value="" placeholder="usuario" id="usuario">
                    <label class="login-usuario" for="usuario"></label>
                    </div>
    
                    <div class="input-group">
                    <input type="password" class="login-field" value="" placeholder="contraseña" id="contraseña">
                    <label class="login-contraseña" for="contraseña"></label>
                    </div>
    
                    <a class="btn" href="#">Iniciar Sesion</a>
                    <a class="login-link" href="#">Olvidaste tu contraseña?</a>
                </div>
            </div>
        </div>
</body>
</html>
